<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mall Billing System — Login</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">🏬</div>
      <h1>Mall Billing System</h1>
      <p>Sign in to continue</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="text" id="email" name="email" placeholder="Enter your email" required autocomplete="username" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password" />
      </div>

      <div id="error-msg" class="alert alert-error hidden"></div>

      <button type="submit" id="login-btn" class="btn btn-primary btn-full" style="margin-top: 8px;">
        Sign In
      </button>
    </form>
  </div>

  <script src="/static/js/auth.js"></script>
</body>
</html>
